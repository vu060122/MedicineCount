<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>用藥紀錄</title>
    
    <!-- iPhone 桌面 App (PWA) 專用設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="用藥紀錄">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#F5F0EA] text-gray-800 font-sans min-h-screen flex justify-center p-0 md:p-8">

    <div class="bg-white md:rounded-2xl shadow-xl w-full max-w-md overflow-hidden animate-fade-in flex flex-col relative min-h-screen md:min-h-[850px]">
        <!-- 標題區 -->
        <div class="bg-[#4A8E8B] text-white py-5 px-6 text-center shadow-sm z-10 relative">
            <h1 class="text-xl font-bold flex items-center justify-center gap-2">
                <i data-lucide="calendar-clock" class="w-6 h-6"></i>
                媽媽的自動用藥紀錄
            </h1>
            <p class="text-[#EAF2F2] mt-1 text-xs opacity-90">舒沃替尼 (每盒預設14顆)</p>
            <button onclick="openSettingsModal()" class="absolute top-4 right-4 p-2 text-white/80 hover:text-white transition-colors bg-white/10 rounded-full" title="設定與備份">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
        </div>

        <div class="p-5 space-y-5 flex-1 overflow-y-auto custom-scrollbar pb-24">
            <!-- 狀態卡片 -->
            <div class="bg-gradient-to-br from-[#EAF2F2] to-[#DCE8E8] rounded-2xl p-6 text-center border border-[#C5D7D6] shadow-sm relative">
                <p class="text-gray-600 text-sm font-medium mb-2">計算至今日 (<span id="todayDisplay"></span>) 剩餘</p>
                <div class="flex items-baseline justify-center gap-1 mb-1">
                    <span id="pillsCount" class="text-6xl font-black text-[#2C5553] drop-shadow-sm">0</span>
                    <span class="text-xl text-[#2C5553] font-bold">顆</span>
                </div>
                <p class="text-xs text-gray-500 mb-5">累計獲得: <span id="totalBought">0</span> 顆 | 已消耗: <span id="totalConsumed">0</span> 顆</p>
                
                <div class="bg-white/60 rounded-xl p-3 flex justify-between items-center text-sm">
                    <div class="text-left">
                        <p class="text-gray-500 text-xs">目前設定劑量</p>
                        <p class="font-bold text-gray-800"><span id="currentDosage">1</span> 顆/天</p>
                    </div>
                    <div class="text-right">
                        <p class="text-gray-500 text-xs">預計可服用到</p>
                        <p id="endDate" class="font-bold text-[#D96C4A] text-base">-</p>
                    </div>
                </div>
            </div>

            <!-- 新增購買區塊 -->
            <div>
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <label class="text-sm font-bold text-[#4A8E8B] flex items-center gap-1 mb-3">
                        <i data-lucide="package-plus" class="w-4 h-4"></i> 登記新拿到的藥
                    </label>
                    <div class="flex items-center gap-2">
                        <input type="date" id="purchaseDate" class="flex-1 text-sm p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#4A8E8B] outline-none">
                        <div class="relative w-24">
                            <input type="number" id="purchaseBoxes" placeholder="幾盒" min="1" step="1" class="w-full text-sm p-2.5 pr-8 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#4A8E8B] outline-none">
                            <span class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 text-sm">盒</span>
                        </div>
                        <button onclick="addPurchase()" class="bg-[#4A8E8B] text-white px-4 py-2.5 rounded-lg hover:bg-[#366865] transition-colors font-medium whitespace-nowrap active:scale-95">新增</button>
                    </div>
                </div>
                
                <div class="text-right mt-2">
                    <button onclick="openAddDosageModal()" class="inline-flex items-center gap-1 text-xs font-medium text-gray-500 hover:text-[#D96C4A] transition-colors px-2 py-1">
                        <i data-lucide="sliders-horizontal" class="w-3.5 h-3.5"></i>
                        醫師有調整劑量嗎？
                    </button>
                </div>
            </div>

            <!-- 歷史紀錄區 -->
            <div class="mt-4 border-t border-gray-200 pt-4">
                <div class="flex gap-4 mb-4">
                    <button onclick="switchTab('purchases')" id="tab-purchases" class="text-sm font-bold text-[#4A8E8B] border-b-2 border-[#4A8E8B] pb-1">購買紀錄</button>
                    <button onclick="switchTab('dosages')" id="tab-dosages" class="text-sm font-bold text-gray-400 pb-1">劑量紀錄</button>
                </div>
                
                <div id="list-purchases" class="space-y-2"></div>
                <div id="list-dosages" class="space-y-2 hidden"></div>
            </div>
        </div>
        
        <!-- 提示訊息框 -->
        <div id="messageBox" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg opacity-0 pointer-events-none transition-opacity duration-300 z-50 whitespace-nowrap text-sm">
            提示訊息
        </div>
    </div>

    <!-- ================= 彈出視窗區塊 ================= -->

    <!-- 全域共用確認視窗 (取代原生的 confirm) -->
    <div id="confirmModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[60] p-4 transition-opacity">
        <div class="bg-white rounded-2xl p-6 w-full max-w-xs shadow-xl text-center">
            <h3 id="confirmTitle" class="text-lg font-bold mb-2 text-gray-800">確認</h3>
            <p id="confirmMessage" class="text-sm text-gray-500 mb-6">您確定要執行此操作嗎？</p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 bg-gray-100 text-gray-700 font-medium py-2.5 rounded-lg active:bg-gray-200">取消</button>
                <button id="confirmBtn" class="flex-1 bg-red-500 text-white font-medium py-2.5 rounded-lg active:scale-95">確定</button>
            </div>
        </div>
    </div>

    <!-- 1. 新增劑量彈窗 -->
    <div id="addDosageModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 transition-opacity p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-xs shadow-xl">
            <h3 class="text-lg font-bold mb-4 text-[#D96C4A] flex items-center gap-2">
                <i data-lucide="sliders-horizontal" class="w-5 h-5"></i> 新增劑量紀錄
            </h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">生效日期</label>
                    <input type="date" id="newDosageDate" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#D96C4A] outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">每日幾顆</label>
                    <input type="number" id="newDosageAmount" step="0.5" min="0.5" placeholder="例如: 1.5" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#D96C4A] outline-none">
                </div>
            </div>
            <div class="mt-6 flex gap-3">
                <button onclick="closeModal('addDosageModal')" class="flex-1 bg-gray-100 text-gray-700 font-medium py-2.5 rounded-lg">取消</button>
                <button onclick="confirmAddDosage()" class="flex-1 bg-[#D96C4A] text-white font-medium py-2.5 rounded-lg">確定新增</button>
            </div>
        </div>
    </div>

    <!-- 2. 編輯紀錄彈窗 -->
    <div id="editModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 transition-opacity p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-xs shadow-xl">
            <h3 id="editModalTitle" class="text-lg font-bold mb-4 flex items-center gap-2">編輯紀錄</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">日期</label>
                    <input type="date" id="editDate" class="w-full p-2.5 border border-gray-300 rounded-lg outline-none">
                </div>
                <div>
                    <label id="editValueLabel" class="block text-sm font-medium text-gray-700 mb-1">數值</label>
                    <input type="number" id="editValue" step="any" min="0.5" class="w-full p-2.5 border border-gray-300 rounded-lg outline-none">
                </div>
            </div>
            <div class="mt-6 flex gap-3">
                <button onclick="closeModal('editModal')" class="flex-1 bg-gray-100 text-gray-700 font-medium py-2.5 rounded-lg">取消</button>
                <button onclick="saveEdit()" class="flex-1 bg-[#4A8E8B] text-white font-medium py-2.5 rounded-lg">儲存修改</button>
            </div>
        </div>
    </div>

    <!-- 3. 設定與備份彈窗 (匯出/匯入) -->
    <div id="settingsModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 transition-opacity p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl max-h-[90vh] overflow-y-auto custom-scrollbar">
            <div class="flex justify-between items-center mb-5 border-b pb-3">
                <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                    <i data-lucide="database" class="w-5 h-5 text-[#4A8E8B]"></i> 資料備份與還原
                </h3>
                <button onclick="closeModal('settingsModal')" class="text-gray-400 hover:text-gray-700"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <div class="space-y-5">
                <!-- 匯出/匯入區 -->
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 space-y-3">
                    <p class="text-xs text-gray-500 mb-1">將下方代碼複製存起來，或是貼上舊代碼來還原紀錄。</p>
                    <textarea id="backupDataInput" rows="4" placeholder="請貼上備份代碼..." class="w-full p-2 text-xs border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#4A8E8B] outline-none font-mono"></textarea>
                    
                    <div class="flex gap-2">
                        <button onclick="copyBackup()" class="flex-1 bg-[#4A8E8B] text-white text-sm font-medium py-2 rounded-lg flex justify-center items-center gap-1 active:scale-95">
                            <i data-lucide="copy" class="w-4 h-4"></i> 複製代碼
                        </button>
                        <button onclick="importData()" class="flex-1 bg-[#D96C4A] text-white text-sm font-medium py-2 rounded-lg flex justify-center items-center gap-1 active:scale-95">
                            <i data-lucide="download" class="w-4 h-4"></i> 匯入還原
                        </button>
                    </div>
                </div>

                <!-- 危險操作區 -->
                <div class="pt-4 border-t border-red-100 text-center">
                    <button onclick="requestResetAll()" class="text-sm text-red-400 hover:text-red-600 font-medium py-2 px-4 rounded-lg hover:bg-red-50 transition-colors">
                        ⚠️ 清除所有紀錄重新開始
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // ======= 自動生成 Apple Icon =======
        function setupAppleIcon() {
            const canvas = document.createElement('canvas');
            canvas.width = 180; canvas.height = 180;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#4A8E8B'; ctx.fillRect(0, 0, 180, 180);
            ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 90px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('藥', 90, 95);
            const link = document.createElement('link');
            link.rel = 'apple-touch-icon';
            link.href = canvas.toDataURL('image/png');
            document.head.appendChild(link);
        }
        setupAppleIcon();

        // ================= 共用確認視窗邏輯 =================
        let confirmCallback = null;

        function showConfirm(title, message, btnText, btnColorClass, callback) {
            document.getElementById('confirmTitle').innerText = title;
            document.getElementById('confirmMessage').innerText = message;
            
            const btn = document.getElementById('confirmBtn');
            btn.innerText = btnText;
            btn.className = `flex-1 text-white font-medium py-2.5 rounded-lg active:scale-95 ${btnColorClass}`;
            
            confirmCallback = callback;
            
            const modal = document.getElementById('confirmModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeConfirm() {
            const modal = document.getElementById('confirmModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            confirmCallback = null;
        }

        document.getElementById('confirmBtn').addEventListener('click', () => {
            if (confirmCallback) confirmCallback();
            closeConfirm();
        });


        // ================= 日期與核心邏輯 =================
        function getLocalDateString(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }
        function parseLocalDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return new Date(y, m - 1, d);
        }

        const todayDate = new Date();
        document.getElementById('todayDisplay').innerText = `${todayDate.getMonth()+1}/${todayDate.getDate()}`;
        document.getElementById('purchaseDate').value = getLocalDateString(todayDate);

        let purchases = [];
        let dosages = [];
        let editingItem = { type: null, id: null };

        function initData() {
            const isInitialized = localStorage.getItem('med_auto_initialized');
            if (!isInitialized) {
                const yr = todayDate.getFullYear();
                purchases = [
                    { id: 1710200000001, date: `${yr}-03-12`, boxes: 4 }, 
                    { id: 1710200000002, date: `${yr}-04-15`, boxes: 2 }  
                ];
                dosages = [
                    { id: 1710200000003, date: `${yr}-03-13`, dosage: 1 },
                    { id: 1710200000004, date: `${yr}-03-28`, dosage: 1.5 },
                    { id: 1710200000005, date: `${yr}-04-01`, dosage: 1 }
                ];
                saveData();
                localStorage.setItem('med_auto_initialized', 'true');
            } else {
                purchases = JSON.parse(localStorage.getItem('med_purchases_list')) || [];
                dosages = JSON.parse(localStorage.getItem('med_dosages_list')) || [];
            }
            updateUI();
        }

        function saveData() {
            localStorage.setItem('med_purchases_list', JSON.stringify(purchases));
            localStorage.setItem('med_dosages_list', JSON.stringify(dosages));
        }

        function calculateStatus() {
            let totalBought = purchases.reduce((sum, p) => sum + (p.boxes * 14), 0);
            let sortedDosages = [...dosages].sort((a, b) => parseLocalDate(a.date) - parseLocalDate(b.date));
            let consumed = 0;
            let currentDosageSetting = 1;

            if (sortedDosages.length > 0) {
                let firstDate = parseLocalDate(sortedDosages[0].date);
                let today = new Date();
                today.setHours(0,0,0,0);

                let iterDate = new Date(firstDate);
                while (iterDate <= today) {
                    let activeDosage = 0;
                    for (let i = sortedDosages.length - 1; i >= 0; i--) {
                        let dDate = parseLocalDate(sortedDosages[i].date);
                        if (dDate <= iterDate) {
                            activeDosage = sortedDosages[i].dosage;
                            break;
                        }
                    }
                    consumed += activeDosage;
                    iterDate.setDate(iterDate.getDate() + 1);
                }

                for (let i = sortedDosages.length - 1; i >= 0; i--) {
                    let dDate = parseLocalDate(sortedDosages[i].date);
                    if (dDate <= today) {
                        currentDosageSetting = sortedDosages[i].dosage;
                        break;
                    }
                }
            }

            let remaining = totalBought - consumed;
            remaining = Math.round(remaining * 10) / 10;
            consumed = Math.round(consumed * 10) / 10;

            let endDateStr = "-";
            if (remaining > 0 && currentDosageSetting > 0) {
                let daysLeft = remaining / currentDosageSetting;
                let endDate = new Date();
                endDate.setDate(endDate.getDate() + Math.ceil(daysLeft)); 
                endDateStr = `${endDate.getMonth() + 1}月${endDate.getDate()}日`;
            } else if (remaining <= 0 && totalBought > 0) {
                endDateStr = "已服完";
            }

            return { remaining, consumed, totalBought, currentDosageSetting, endDateStr };
        }

        function updateUI() {
            let stats = calculateStatus();
            document.getElementById('pillsCount').innerText = stats.remaining < 0 ? 0 : stats.remaining;
            document.getElementById('totalBought').innerText = stats.totalBought;
            document.getElementById('totalConsumed').innerText = stats.consumed;
            document.getElementById('currentDosage').innerText = stats.currentDosageSetting;
            
            let endDateEl = document.getElementById('endDate');
            endDateEl.innerText = stats.endDateStr;
            if(stats.remaining <= 0) {
                endDateEl.classList.replace('text-[#D96C4A]', 'text-red-500');
            } else {
                endDateEl.classList.replace('text-red-500', 'text-[#D96C4A]');
            }
            renderLists();
            
            document.getElementById('backupDataInput').value = JSON.stringify({ purchases, dosages });
        }

        function addPurchase() {
            let dateVal = document.getElementById('purchaseDate').value;
            let boxesVal = parseInt(document.getElementById('purchaseBoxes').value);
            if (dateVal && boxesVal > 0) {
                purchases.push({ id: Date.now(), date: dateVal, boxes: boxesVal });
                saveData();
                updateUI();
                document.getElementById('purchaseBoxes').value = '';
                showMessage(`✅ 已登錄：${dateVal} 購買 ${boxesVal} 盒`);
            } else {
                showMessage('⚠️ 請確認日期與盒數', true);
            }
        }

        // ================= 刪除邏輯改版 (使用自訂確認框) =================
        function requestDelete(type, id) {
            showConfirm(
                '刪除紀錄', 
                '確定要刪除這筆紀錄嗎？系統將會重新計算剩餘藥量。', 
                '確定刪除', 
                'bg-red-500', 
                () => {
                    let targetIdStr = String(id);
                    if (type === 'purchase') {
                        purchases = purchases.filter(p => String(p.id) !== targetIdStr);
                    } else {
                        dosages = dosages.filter(d => String(d.id) !== targetIdStr);
                    }
                    saveData();
                    updateUI();
                    showMessage('🗑️ 紀錄已刪除');
                }
            );
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            if (modalId === 'editModal') editingItem = { type: null, id: null };
        }

        function openSettingsModal() {
            document.getElementById('backupDataInput').value = JSON.stringify({ purchases, dosages });
            const modal = document.getElementById('settingsModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function copyBackup() {
            const input = document.getElementById('backupDataInput');
            input.select();
            input.setSelectionRange(0, 99999);
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(input.value);
                } else {
                    document.execCommand('copy');
                }
                showMessage('✅ 備份代碼已複製！');
            } catch (err) {
                showMessage('⚠️ 複製失敗，請手動全選文字複製', true);
            }
        }

        // ================= 匯入邏輯改版 (使用自訂確認框) =================
        function importData() {
            const str = document.getElementById('backupDataInput').value;
            if (!str) {
                showMessage('⚠️ 請先貼上備份代碼', true);
                return;
            }
            try {
                const data = JSON.parse(str);
                if (data.purchases && data.dosages) {
                    showConfirm(
                        '匯入還原資料', 
                        '確定要匯入嗎？這將會覆蓋掉目前裝置上所有的舊資料喔！', 
                        '確定覆蓋並還原', 
                        'bg-[#D96C4A]', 
                        () => {
                            purchases = data.purchases;
                            dosages = data.dosages;
                            saveData();
                            updateUI();
                            closeModal('settingsModal');
                            showMessage('🎉 資料匯入並還原成功！');
                        }
                    );
                } else {
                    showMessage('⚠️ 格式錯誤：找不到藥物紀錄', true);
                }
            } catch (e) {
                showMessage('⚠️ 代碼格式錯誤，匯入失敗', true);
            }
        }

        // ================= 重置邏輯改版 (使用自訂確認框) =================
        function requestResetAll() {
            showConfirm(
                '⚠️ 清除所有紀錄', 
                '這將會清除「所有」歷史紀錄並完全歸零！請確認是否要執行？', 
                '確定清除', 
                'bg-red-600', 
                () => {
                    purchases = [];
                    dosages = [];
                    saveData();
                    updateUI();
                    closeModal('settingsModal');
                    showMessage('🔄 所有紀錄已清空');
                }
            );
        }

        function openAddDosageModal() {
            document.getElementById('newDosageDate').value = getLocalDateString(new Date());
            document.getElementById('newDosageAmount').value = '';
            document.getElementById('addDosageModal').classList.remove('hidden');
            document.getElementById('addDosageModal').classList.add('flex');
        }

        function confirmAddDosage() {
            let dateVal = document.getElementById('newDosageDate').value;
            let dosageVal = parseFloat(document.getElementById('newDosageAmount').value);
            if (dateVal && dosageVal > 0) {
                let existingIndex = dosages.findIndex(d => d.date === dateVal);
                if (existingIndex >= 0) dosages.splice(existingIndex, 1);
                dosages.push({ id: Date.now(), date: dateVal, dosage: dosageVal });
                saveData();
                updateUI();
                closeModal('addDosageModal');
                showMessage(`✅ ${dateVal} 起改為 ${dosageVal} 顆/天`);
                switchTab('dosages');
            } else {
                showMessage('⚠️ 請確認日期與劑量', true);
            }
        }

        function openEditModal(type, id) {
            editingItem = { type, id };
            const modal = document.getElementById('editModal');
            const dateInput = document.getElementById('editDate');
            const valueInput = document.getElementById('editValue');
            const valueLabel = document.getElementById('editValueLabel');
            const titleText = document.getElementById('editModalTitle');

            if (type === 'purchase') {
                const item = purchases.find(p => String(p.id) === String(id));
                titleText.innerHTML = `<i data-lucide="package" class="w-5 h-5 text-[#4A8E8B]"></i><span class="text-[#4A8E8B]">編輯購買紀錄</span>`;
                valueLabel.innerText = "購買盒數";
                dateInput.value = item.date;
                valueInput.value = item.boxes;
            } else {
                const item = dosages.find(d => String(d.id) === String(id));
                titleText.innerHTML = `<i data-lucide="sliders-horizontal" class="w-5 h-5 text-[#D96C4A]"></i><span class="text-[#D96C4A]">編輯劑量紀錄</span>`;
                valueLabel.innerText = "每日劑量 (顆/天)";
                dateInput.value = item.date;
                valueInput.value = item.dosage;
            }
            lucide.createIcons();
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function saveEdit() {
            const newDate = document.getElementById('editDate').value;
            const newValue = parseFloat(document.getElementById('editValue').value);

            if (!newDate || isNaN(newValue) || newValue <= 0) {
                showMessage('⚠️ 請確認日期與數值是否正確', true);
                return;
            }

            if (editingItem.type === 'purchase') {
                const index = purchases.findIndex(p => String(p.id) === String(editingItem.id));
                if (index !== -1) {
                    purchases[index].date = newDate;
                    purchases[index].boxes = parseInt(newValue);
                }
            } else {
                dosages = dosages.filter(d => !(d.date === newDate && String(d.id) !== String(editingItem.id)));
                const index = dosages.findIndex(d => String(d.id) === String(editingItem.id));
                if (index !== -1) {
                    dosages[index].date = newDate;
                    dosages[index].dosage = newValue;
                }
            }

            saveData();
            updateUI();
            closeModal('editModal');
            showMessage('✅ 紀錄已更新');
        }

        function renderLists() {
            let pList = document.getElementById('list-purchases');
            let dList = document.getElementById('list-dosages');
            
            let sortedP = [...purchases].sort((a, b) => parseLocalDate(b.date) - parseLocalDate(a.date));
            pList.innerHTML = sortedP.length === 0 ? '<p class="text-center text-sm text-gray-400 py-4">尚無紀錄</p>' : '';
            sortedP.forEach(p => {
                pList.innerHTML += `
                    <div class="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm border border-gray-100 mb-2">
                        <div>
                            <p class="text-sm font-bold text-gray-700">${p.date.replace(/-/g, '/')}</p>
                            <p class="text-xs text-gray-500">買了 <span class="font-bold text-[#4A8E8B]">${p.boxes}</span> 盒 (共 ${p.boxes * 14} 顆)</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="openEditModal('purchase', '${p.id}')" class="text-gray-400 hover:text-[#4A8E8B] p-2 bg-gray-50 rounded-lg active:scale-90" title="編輯">
                                <i data-lucide="edit-3" class="w-4 h-4"></i>
                            </button>
                            <button onclick="requestDelete('purchase', '${p.id}')" class="text-gray-400 hover:text-red-500 p-2 bg-gray-50 rounded-lg active:scale-90" title="刪除">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `;
            });

            let sortedD = [...dosages].sort((a, b) => parseLocalDate(b.date) - parseLocalDate(a.date));
            dList.innerHTML = sortedD.length === 0 ? '<p class="text-center text-sm text-gray-400 py-4">尚無紀錄</p>' : '';
            sortedD.forEach(d => {
                dList.innerHTML += `
                    <div class="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm border border-gray-100 mb-2">
                        <div>
                            <p class="text-sm font-bold text-gray-700">${d.date.replace(/-/g, '/')} <span class="text-xs font-normal text-gray-500">起生效</span></p>
                            <p class="text-xs text-gray-500">每日 <span class="font-bold text-[#D96C4A]">${d.dosage}</span> 顆</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="openEditModal('dosage', '${d.id}')" class="text-gray-400 hover:text-[#D96C4A] p-2 bg-gray-50 rounded-lg active:scale-90" title="編輯">
                                <i data-lucide="edit-3" class="w-4 h-4"></i>
                            </button>
                            <button onclick="requestDelete('dosage', '${d.id}')" class="text-gray-400 hover:text-red-500 p-2 bg-gray-50 rounded-lg active:scale-90" title="刪除">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function switchTab(tab) {
            if(tab === 'purchases') {
                document.getElementById('list-purchases').classList.remove('hidden');
                document.getElementById('list-dosages').classList.add('hidden');
                document.getElementById('tab-purchases').className = "text-sm font-bold text-[#4A8E8B] border-b-2 border-[#4A8E8B] pb-1";
                document.getElementById('tab-dosages').className = "text-sm font-bold text-gray-400 pb-1";
            } else {
                document.getElementById('list-purchases').classList.add('hidden');
                document.getElementById('list-dosages').classList.remove('hidden');
                document.getElementById('tab-purchases').className = "text-sm font-bold text-gray-400 pb-1";
                document.getElementById('tab-dosages').className = "text-sm font-bold text-[#D96C4A] border-b-2 border-[#D96C4A] pb-1";
            }
        }

        let messageTimeout;
        function showMessage(text, isError = false) {
            const msgBox = document.getElementById('messageBox');
            msgBox.innerText = text;
            msgBox.className = `fixed bottom-10 left-1/2 transform -translate-x-1/2 text-white px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 z-50 whitespace-nowrap text-sm ${isError ? 'bg-red-600' : 'bg-gray-800'}`;
            msgBox.style.opacity = '1';
            clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => msgBox.style.opacity = '0', 3000);
        }

        initData();
    </script>
</body>
</html>
